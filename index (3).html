  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

tesk',system-ui,sans-serif;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}\n  ::selection{background:var(--accent,#7c3aed);color:#fff}\n  a{color:inherit}\n  input,textarea,button{font-family:inherit}\n  @keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}\n  html{scroll-behavior:smooth}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"--accent: {{accent}}; --rose: {{rose}}; --head: {{headFont}}; position:relative; background:#0a0a0f; overflow:hidden\">\n\n  <!-- grain overlay -->\n  <div style=\"position:fixed; inset:0; z-index:60; pointer-events:none; mix-blend-mode:multiply; opacity:.05; display:{{grainDisplay}}; background-image:url('data:image/svg+xml;utf8,&lt;svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22120%22 height=%22120%22&gt;&lt;filter id=%22n%22&gt;&lt;feTurbulence type=%22fractalNoise%22 baseFrequency=%220.9%22 numOctaves=%222%22/&gt;&lt;/filter&gt;&lt;rect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23n)%22/&gt;&lt;/svg&gt;')\"><\u002Fdiv>\n\n  <!-- ================= NAV ================= -->\n  <nav style=\"position:sticky; top:0; z-index:50; display:flex; flex-wrap:wrap; align-items:center; justify-content:space-between; gap:12px 20px; padding:16px clamp(20px,5vw,72px); background:rgba(10,10,15,.85); backdrop-filter:blur(12px); border-bottom:1px solid rgba(255,255,255,.09)\">\n    <button onclick=\"{{ goHome }}\" style=\"display:flex; align-items:center; gap:11px; background:none; border:none; cursor:pointer; padding:0\">\n      <span style=\"width:24px; height:24px; border-radius:50%; background:var(--accent,#7c3aed); display:inline-flex; align-items:center; justify-content:center\">\n        <span style=\"width:9px; height:9px; border-radius:50%; background:var(--rose,#f0a3cc)\"><\u002Fspan>\n      <\u002Fspan>\n      <span style=\"font-family:var(--head,'Fraunces',Georgia,serif); font-size:21px; font-weight:500; letter-spacing:-.01em; color:#f0edf5\">Sasha Lawrence<\u002Fspan>\n    <\u002Fbutton>\n    <div style=\"display:flex; flex-wrap:wrap; align-items:center; justify-content:flex-end; gap:clamp(10px,2.2vw,30px); row-gap:10px\">\n      <button onclick=\"{{ goHome }}\" style=\"background:none; border:none; cursor:pointer; font-size:14.5px; color:{{ homeColor }}; font-weight:{{ homeWeight }}; padding:4px 0\">Home<\u002Fbutton>\n      <button onclick=\"{{ goWork }}\" style=\"background:none; border:none; cursor:pointer; font-size:14.5px; color:{{ workColor }}; font-weight:{{ workWeight }}; padding:4px 0\">Workshops<\u002Fbutton>\n      <button onclick=\"{{ goAbout }}\" style=\"background:none; border:none; cursor:pointer; font-size:14.5px; color:#b4abc4; font-weight:500; padding:4px 0\">About<\u002Fbutton>\n      <a href=\"https://www.serenity-sound-healing.com\" target=\"_blank\" rel=\"noopener noreferrer\" style=\"text-decoration:none; font-size:14.5px; color:#b4abc4; font-weight:500; padding:4px 0\">Sound Healing<\u002Fa>\n      <a href=\"#contact\" style=\"text-decoration:none; font-size:14px; font-weight:600; color:#fff; background:var(--accent,#7c3aed); padding:10px 20px; border-radius:100px\" style-hover=\"filter:brightness(1.08)\">Book me<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fnav>\n\n  <!-- ===================================================================== -->\n  <!-- ============================ HOME VIEW ============================== -->\n  <!-- ===================================================================== -->\n  <sc-if value=\"{{ isHome }}\" hint-placeholder-val=\"{{ true }}\">\n  <div>\n\n    <!-- HERO -->\n    <header id=\"top\" style=\"max-width:1240px; margin:0 auto; padding:clamp(52px,8vw,104px) clamp(20px,5vw,72px) clamp(40px,6vw,72px); display:grid; grid-template-columns:repeat(auto-fit, minmax(300px, 1fr)); gap:clamp(36px,5vw,72px); align-items:center\">\n      <div>\n        <div style=\"display:inline-flex; align-items:center; gap:9px; font-family:'Spline Sans Mono',monospace; font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:var(--accent,#7c3aed); margin-bottom:26px\">\n          Facilitator, Public Speaker &amp; Mental Health Advocate\n        <\u002Fdiv>\n        <h1 style=\"font-family:var(--head,'Fraunces',Georgia,serif); font-weight:300; font-size:clamp(38px,5.6vw,70px); line-height:1.04; letter-spacing:-.02em; margin:0 0 24px\">\n          Workshops that help people <span style=\"font-style:italic; color:var(--accent,#7c3aed)\">feel steady<\u002Fspan> and lead well.\n        <\u002Fh1>\n        <p style=\"max-width:31em; font-size:clamp(16px,1.5vw,19px); line-height:1.62; color:#b4abc4; margin:0 0 32px\">\n          I’m Sasha Lawrence, a facilitator with an M.S. in Applied Psychology. I design and lead workshops on leadership, emotional intelligence, and nervous&nbsp;system regulation for teams and organizations doing meaningful work.\n        <\u002Fp>\n        <div style=\"display:flex; flex-wrap:wrap; gap:14px; align-items:center\">\n          <button onclick=\"{{ goWork }}\" style=\"cursor:pointer; text-decoration:none; font-size:15.5px; font-weight:600; color:#fff; background:var(--accent,#7c3aed); padding:15px 26px; border-radius:100px; border:none\" style-hover=\"filter:brightness(1.08)\">Explore workshops →<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"display:flex; gap:clamp(20px,3vw,42px); margin-top:44px; padding-top:26px; border-top:1px solid rgba(255,255,255,.12)\">\n          <div>\n            <div style=\"font-family:var(--head,'Fraunces',Georgia,serif); font-size:30px; font-weight:400\">5 yrs<\u002Fdiv>\n            <div style=\"font-size:13px; color:#9d93ad; margin-top:2px\">facilitating workshops<\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-family:var(--head,'Fraunces',Georgia,serif); font-size:30px; font-weight:400\">M.S.<\u002Fdiv>\n            <div style=\"font-size:13px; color:#9d93ad; margin-top:2px\">Applied Psychology<\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-family:var(--head,'Fraunces',Georgia,serif); font-size:30px; font-weight:400\">Rooted<\u002Fdiv>\n            <div style=\"font-size:13px; color:#9d93ad; margin-top:2px\">signature method<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"position:relative\">\n        <div style=\"position:relative; aspect-ratio:4/5; border-radius:220px 220px 16px 16px; overflow:hidden; border:1px solid rgba(255,255,255,.12)\">\n          <img src=\"1c6796d8-6174-465d-8992-d526beebee5e\" alt=\"Sasha Lawrence\" style=\"width:100%; height:100%; object-fit:cover; display:block\">\n        <\u002Fdiv>\n        <div style=\"position:absolute; bottom:-22px; left:-22px; background:#14121a; border:1px solid rgba(255,255,255,.14); border-radius:12px; padding:14px 18px; box-shadow:0 14px 36px -18px rgba(0,0,0,.6); animation:floaty 6s ease-in-out infinite\">\n          <div style=\"font-family:'Spline Sans Mono',monospace; font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#c9b8e8\">Signature workshop<\u002Fdiv>\n          <div style=\"font-family:var(--head,'Fraunces',Georgia,serif); font-size:20px; margin-top:3px; font-style:italic\">Rooted &amp; Regulated<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fheader>\n\n    <!-- SIGNATURE WORKSHOP BAND -->\n    <section style=\"background:#130f1b; border-top:1px solid rgba(255,255,255,.08); border-bottom:1px solid rgba(255,255,255,.08)\">\n      <div style=\"max-width:1240px; margin:0 auto; padding:clamp(52px,7vw,92px) clamp(20px,5vw,72px); display:grid; grid-template-columns:repeat(auto-fit, minmax(280px, 1fr)); gap:clamp(36px,5vw,72px); align-items:center\">\n        <div>\n          <div style=\"font-family:'Spline Sans Mono',monospace; font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:var(--accent,#7c3aed); margin-bottom:16px\">The signature workshop<\u002Fdiv>\n          <h2 style=\"font-family:var(--head,'Fraunces',Georgia,serif); font-weight:300; font-size:clamp(32px,4.6vw,54px); line-height:1.04; letter-spacing:-.02em; margin:0 0 20px\"><span style=\"font-style:italic\">Rooted &amp; Regulated<\u002Fspan><\u002Fh2>\n          <p style=\"font-size:17px; line-height:1.65; color:#ded6e8; margin:0 0 20px; max-width:34em\">A nervous system regulation workshop for high-performing women. We look at what drives the overwhelm, then build practical, body-based tools to stay grounded, clear, and resourced under pressure.<\u002Fp>\n          <p style=\"font-size:15.5px; line-height:1.65; color:#b4abc4; margin:0 0 28px; max-width:34em\">Built for women-led companies, groups, and organizations who want their people to lead from a steadier place, not from burnout.<\u002Fp>\n          <a href=\"#contact\" style=\"text-decoration:none; font-size:15px; font-weight:600; color:#fff; background:var(--accent,#7c3aed); padding:14px 24px; border-radius:100px; display:inline-block\" style-hover=\"filter:brightness(1.08)\">Bring it to your team<\u002Fa>\n        <\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:14px\">\n          <sc-for list=\"{{ rootedPoints }}\" as=\"p\" hint-placeholder-count=\"3\">\n            <div style=\"background:#14121a; border:1px solid rgba(255,255,255,.1); border-radius:14px; padding:22px 24px\">\n              <div style=\"font-family:var(--head,'Fraunces',Georgia,serif); font-size:19px; font-weight:500; margin-bottom:6px\">{{ p.title }}<\u002Fdiv>\n              <p style=\"font-size:14.5px; line-height:1.55; color:#b4abc4; margin:0\">{{ p.desc }}<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- WHAT MAKES IT DIFFERENT -->\n    <section style=\"background:#000000; border-top:1px solid rgba(255,255,255,.08); border-bottom:1px solid rgba(255,255,255,.08)\">\n      <div style=\"max-width:1240px; margin:0 auto; padding:clamp(52px,7vw,92px) clamp(20px,5vw,72px)\">\n        <div style=\"max-width:38em; margin-bottom:clamp(36px,5vw,52px)\">\n          <div style=\"font-family:'Spline Sans Mono',monospace; font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:var(--rose,#f0a3cc); margin-bottom:16px\">The space I move from<\u002Fdiv>\n          <h2 style=\"font-family:var(--head,'Fraunces',Georgia,serif); font-weight:300; font-size:clamp(28px,4vw,46px); line-height:1.1; letter-spacing:-.02em; margin:0 0 22px\">I name what everyone already knows.<\u002Fh2>\n          <p style=\"font-size:16.5px; line-height:1.65; color:#ded6e8; margin:0 0 14px\">In Rooted &amp; Regulated, I help groups name the dynamics they’ve been quietly enduring: elitism, gossip, cliques, hidden competition, and I help them move through conflict toward real repair.<\u002Fp>\n          <p style=\"font-size:16.5px; line-height:1.65; color:#ded6e8; margin:0\">I like to get to the root of things, because that’s where the real change starts.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:clamp(14px,2vw,20px)\">\n          <sc-for list=\"{{ namedDynamics }}\" as=\"d\" hint-placeholder-count=\"4\">\n            <div style=\"background:#14121a; border:1px solid rgba(255,255,255,.1); border-radius:14px; padding:24px 22px; min-height:170px; display:flex; flex-direction:column; justify-content:space-between\">\n              <div style=\"font-family:'Spline Sans Mono',monospace; font-size:11.5px; letter-spacing:.08em; text-transform:uppercase; color:var(--accent,#7c3aed)\">Named, not avoided<\u002Fdiv>\n              <div>\n                <div style=\"font-family:var(--head,'Fraunces',Georgia,serif); font-size:19px; font-weight:500; margin:14px 0 8px\">{{ d.title }}<\u002Fdiv>\n                <p style=\"font-size:14px; line-height:1.55; color:#b4abc4; margin:0\">{{ d.desc }}<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- WHO I WORK WITH -->\n    <section style=\"max-width:1240px; margin:0 auto; padding:clamp(52px,7vw,92px) clamp(20px,5vw,72px)\">\n      <div style=\"display:flex; flex-wrap:wrap; align-items:flex-end; justify-content:space-between; gap:20px; margin-bottom:clamp(32px,4vw,48px)\">\n        <div>\n          <div style=\"font-family:'Spline Sans Mono',monospace; font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:var(--accent,#7c3aed); margin-bottom:14px\">Who I work with<\u002Fdiv>\n          <h2 style=\"font-family:var(--head,'Fraunces',Georgia,serif); font-weight:300; font-size:clamp(28px,4vw,46px); line-height:1.06; letter-spacing:-.02em; margin:0; max-width:15em\">People and teams doing work that matters.<\u002Fh2>\n        <\u002Fdiv>\n        <p style=\"max-width:22em; font-size:15.5px; line-height:1.6; color:#b4abc4; margin:0\">From small teams to large organizations, I tailor every session to the room in front of me.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:repeat(auto-fit, minmax(130px, 1fr)); gap:14px\">\n        <sc-for list=\"{{ audiences }}\" as=\"a\" hint-placeholder-count=\"5\">\n          <div style=\"background:#14121a; border:1px solid rgba(255,255,255,.1); border-radius:14px; padding:24px 20px; min-height:150px; display:flex; flex-direction:column; justify-content:space-between\">\n            <span style=\"width:34px; height:34px; border-radius:50%; background:var(--rose,#f0a3cc); opacity:.85; display:inline-block\"><\u002Fspan>\n            <div style=\"font-family:var(--head,'Fraunces',Georgia,serif); font-size:18px; font-weight:500; line-height:1.15; margin-top:16px\">{{ a }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ORGANIZATIONS -->\n    <section style=\"background:#150f14; border-top:1px solid rgba(255,255,255,.08); border-bottom:1px solid rgba(255,255,255,.08)\">\n      <div style=\"max-width:1240px; margin:0 auto; padding:clamp(44px,6vw,72px) clamp(20px,5vw,72px)\">\n        <div style=\"font-family:'Spline Sans Mono',monospace; font-size:11.5px; letter-spacing:.14em; text-transform:uppercase; color:#a99bb5; margin-bottom:26px\">Organizations I’ve partnered with<\u002Fdiv>\n        <div style=\"display:flex; flex-wrap:wrap; align-items:center; gap:clamp(20px,3vw,44px)\">\n          <sc-for list=\"{{ orgs }}\" as=\"o\" hint-placeholder-count=\"5\">\n            <span style=\"font-family:var(--head,'Fraunces',Georgia,serif); font-size:clamp(17px,2vw,23px); font-weight:400; color:#ded6e8; letter-spacing:-.01em; line-height:1.2\">{{ o }}<\u002Fspan>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- TESTIMONIALS -->\n    <section style=\"max-width:1240px; margin:0 auto; padding:clamp(52px,7vw,92px) clamp(20px,5vw,72px)\">\n      <div style=\"font-family:'Spline Sans Mono',monospace; font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:var(--accent,#7c3aed); margin-bottom:14px\">In their words<\u002Fdiv>\n      <h2 style=\"font-family:var(--head,'Fraunces',Georgia,serif); font-weight:300; font-size:clamp(28px,4vw,46px); line-height:1.06; letter-spacing:-.02em; margin:0 0 clamp(32px,4vw,48px); max-width:16em\">Testimonials<\u002Fh2>\n      <div style=\"background:#14121a; border:1px solid rgba(255,255,255,.1); border-radius:16px; padding:clamp(26px,3.5vw,36px); display:grid; grid-template-columns:repeat(auto-fit, minmax(280px, 1fr)); gap:clamp(28px,4vw,48px); align-items:start\">\n        <div>\n          <div style=\"font-family:'Spline Sans Mono',monospace; font-size:11.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--rose,#f0a3cc); margin-bottom:12px\">Worked with me?<\u002Fdiv>\n          <h3 style=\"font-family:var(--head,'Fraunces',Georgia,serif); font-weight:400; font-size:22px; margin:0 0 10px\">Leave a testimonial<\u002Fh3>\n          <p style=\"font-size:14.5px; line-height:1.6; color:#9d93ad; margin:0\">Share a few words about our work together. I read every submission and post it here myself before it goes live.<\u002Fp>\n        <\u002Fdiv>\n        <sc-if value=\"{{ testimonialSent }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.12); border-radius:12px; padding:28px; text-align:center\">\n            <div style=\"font-family:var(--head,'Fraunces',Georgia,serif); font-size:20px; margin-bottom:8px\">Thank you.<\u002Fdiv>\n            <p style=\"font-size:14.5px; line-height:1.6; color:#ded6e8; margin:0\">Your testimonial is on its way to me for review. I’ll post it once I’ve had a look.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ testimonialNotSent }}\" hint-placeholder-val=\"{{ true }}\">\n          <form onsubmit=\"{{ submitTestimonial }}\" style=\"display:flex; flex-direction:column; gap:14px\">\n            <div style=\"display:grid; grid-template-columns:repeat(auto-fit, minmax(160px, 1fr)); gap:14px\">\n              <div>\n                <label style=\"display:block; font-size:12px; font-weight:600; color:#9d93ad; margin-bottom:6px; letter-spacing:.02em\">YOUR NAME<\u002Flabel>\n                <input value=\"{{ tName }}\" oninput=\"{{ onTName }}\" placeholder=\"Jane Doe\" style=\"width:100%; padding:12px 14px; border:1px solid rgba(255,255,255,.14); border-radius:10px; font-size:14.5px; color:#f0edf5; background:#1f1a29; outline:none\" style-focus=\"border-color:var(--accent,#7c3aed)\">\n              <\u002Fdiv>\n              <div>\n                <label style=\"display:block; font-size:12px; font-weight:600; color:#9d93ad; margin-bottom:6px; letter-spacing:.02em\">ORGANIZATION<\u002Flabel>\n                <input value=\"{{ tOrg }}\" oninput=\"{{ onTOrg }}\" placeholder=\"Company or chapter\" style=\"width:100%; padding:12px 14px; border:1px solid rgba(255,255,255,.14); border-radius:10px; font-size:14.5px; color:#f0edf5; background:#1f1a29; outline:none\" style-focus=\"border-color:var(--accent,#7c3aed)\">\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div>\n              <label style=\"display:block; font-size:12px; font-weight:600; color:#9d93ad; margin-bottom:6px; letter-spacing:.02em\">YOUR TESTIMONIAL<\u002Flabel>\n              <textarea value=\"{{ tQuote }}\" oninput=\"{{ onTQuote }}\" rows=\"4\" placeholder=\"What was our work together like?\" style=\"width:100%; padding:12px 14px; border:1px solid rgba(255,255,255,.14); border-radius:10px; font-size:14.5px; color:#f0edf5; background:#1f1a29; outline:none; resize:vertical; font-family:inherit\" style-focus=\"border-color:var(--accent,#7c3aed)\"><\u002Ftextarea>\n            <\u002Fdiv>\n            <button type=\"submit\" style=\"align-self:flex-start; margin-top:2px; padding:13px 26px; border:none; border-radius:100px; background:var(--accent,#7c3aed); color:#fff; font-size:14.5px; font-weight:600; cursor:pointer\" style-hover=\"filter:brightness(1.1)\">Submit testimonial<\u002Fbutton>\n          <\u002Fform>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ABOUT -->\n    <section id=\"about\" style=\"background:#000000; color:#f0edf5\">\n      <div style=\"max-width:1240px; margin:0 auto; padding:clamp(52px,8vw,100px) clamp(20px,5vw,72px); display:grid; grid-template-columns:repeat(auto-fit, minmax(280px, 1fr)); gap:clamp(36px,5vw,72px); align-items:center\">\n        <div style=\"position:relative; aspect-ratio:1/1; border-radius:16px; overflow:hidden\">\n          <img src=\"1b44aa2d-88ff-48fa-8916-b0b7cb9be013\" alt=\"Sasha Lawrence\" style=\"width:100%; height:100%; object-fit:cover; display:block\">\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-family:'Spline Sans Mono',monospace; font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:var(--rose,#f0a3cc); margin-bottom:18px\">About Sasha<\u002Fdiv>\n          <blockquote style=\"font-family:var(--head,'Fraunces',Georgia,serif); font-weight:300; font-size:clamp(23px,3vw,34px); line-height:1.32; letter-spacing:-.01em; margin:0 0 26px\">\n            “When people feel regulated, seen, and understood, they do their best thinking, and their best leading.”\n          <\u002Fblockquote>\n          <p style=\"max-width:40em; font-size:16px; line-height:1.7; color:#ded6e8; margin:0 0 16px\">\n            I hold a <strong style=\"color:#f0edf5; font-weight:600\">B.A. in Psychology<\u002Fstrong> and an <strong style=\"color:#f0edf5; font-weight:600\">M.S. in Applied Psychology<\u002Fstrong>, both from the University of Southern California, with a focus on consumer and organizational psychology; I’ve spent the last five years facilitating workshops for teams, sororities, nonprofits, and mission-driven organizations.\n          <\u002Fp>\n          <p style=\"max-width:40em; font-size:16px; line-height:1.7; color:#ded6e8; margin:0 0 16px\">\n            I’ve also served as a community health organizer in USC’s Office for Health Promotion Strategy, work that continues to shape how I think about wellbeing at scale.\n          <\u002Fp>\n          <p style=\"max-width:40em; font-size:16px; line-height:1.7; color:#ded6e8; margin:0 0 30px\">\n            My work blends the science of how we think and regulate with the human craft of holding a room. The result: sessions that feel warm and safe, and still get somewhere real.\n          <\u002Fp>\n          <div style=\"display:flex; flex-wrap:wrap; gap:10px; margin-bottom:26px\">\n            <span style=\"font-size:13px; padding:8px 14px; border:1px solid rgba(255,255,255,.18); border-radius:100px\">Nervous system regulation<\u002Fspan>\n            <span style=\"font-size:13px; padding:8px 14px; border:1px solid rgba(255,255,255,.18); border-radius:100px\">Leadership<\u002Fspan>\n            <span style=\"font-size:13px; padding:8px 14px; border:1px solid rgba(255,255,255,.18); border-radius:100px\">Emotional intelligence<\u002Fspan>\n            <span style=\"font-size:13px; padding:8px 14px; border:1px solid rgba(255,255,255,.18); border-radius:100px\">Organizational psychology<\u002Fspan>\n            <span style=\"font-size:13px; padding:8px 14px; border:1px solid rgba(255,255,255,.18); border-radius:100px\">Public speaking<\u002Fspan>\n            <span style=\"font-size:13px; padding:8px 14px; border:1px solid rgba(255,255,255,.18); border-radius:100px\">Mental health advocacy<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.12); border-radius:14px; padding:22px 24px\">\n            <div style=\"font-family:'Spline Sans Mono',monospace; font-size:11.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--rose,#f0a3cc); margin-bottom:10px\">Also trained in<\u002Fdiv>\n            <p style=\"font-size:15px; line-height:1.65; color:#ded6e8; margin:0 0 12px\">Sound healing and breathwork; I bring these modalities into my own practice as Serenity Sound Healing, offering a slower, somatic complement to the facilitation work above.<\u002Fp>\n            <a href=\"https://www.serenity-sound-healing.com\" target=\"_blank\" rel=\"noopener noreferrer\" style=\"font-size:14px; font-weight:600; color:var(--rose,#f0a3cc); text-decoration:none\">Visit Serenity Sound Healing →<\u002Fa>\n            <div style=\"margin-top:16px; padding-top:16px; border-top:1px solid rgba(255,255,255,.1)\">\n              <div style=\"font-family:'Spline Sans Mono',monospace; font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:#9d93ad; margin-bottom:4px\">Training<\u002Fdiv>\n              <p style=\"font-size:15px; line-height:1.6; color:#ded6e8; margin:0\">Practicing Liberation: Leadership &amp; Facilitation Training, Hala Khouri; trauma-informed practice in conflict, complexity, and repair.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- FAQ -->\n    <section id=\"faq\" style=\"max-width:940px; margin:0 auto; padding:clamp(52px,8vw,96px) clamp(20px,5vw,72px)\">\n      <div style=\"font-family:'Spline Sans Mono',monospace; font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:var(--accent,#7c3aed); margin-bottom:14px; text-align:center\">Questions<\u002Fdiv>\n      <h2 style=\"font-family:var(--head,'Fraunces',Georgia,serif); font-weight:300; font-size:clamp(28px,4vw,46px); line-height:1.06; letter-spacing:-.02em; margin:0 0 clamp(30px,4vw,46px); text-align:center\">Good things to know<\u002Fh2>\n      <div style=\"display:flex; flex-direction:column; gap:0; border-top:1px solid rgba(255,255,255,.14)\">\n        <sc-for list=\"{{ faqs }}\" as=\"f\" hint-placeholder-count=\"5\">\n          <div style=\"border-bottom:1px solid rgba(255,255,255,.14)\">\n            <button onclick=\"{{ f.toggle }}\" style=\"width:100%; display:flex; align-items:center; justify-content:space-between; gap:20px; padding:24px 4px; background:none; border:none; cursor:pointer; text-align:left\">\n              <span style=\"font-family:var(--head,'Fraunces',Georgia,serif); font-size:clamp(18px,2vw,23px); font-weight:500; letter-spacing:-.01em; color:#f0edf5\">{{ f.q }}<\u002Fspan>\n              <span style=\"font-family:'Spline Sans Mono',monospace; font-size:22px; color:var(--accent,#7c3aed); flex:none; line-height:1\">{{ f.sign }}<\u002Fspan>\n            <\u002Fbutton>\n            <sc-if value=\"{{ f.isOpen }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"overflow:hidden\">\n                <p style=\"font-size:15.5px; line-height:1.65; color:#b4abc4; margin:0; padding:0 40px 26px 4px; max-width:46em\">{{ f.a }}<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===================================================================== -->\n  <!-- ========================== WORKSHOPS VIEW =========================== -->\n  <!-- ===================================================================== -->\n  <sc-if value=\"{{ isWork }}\" hint-placeholder-val=\"{{ false }}\">\n  <div>\n\n    <!-- WORKSHOPS HEADER -->\n    <header style=\"max-width:1240px; margin:0 auto; padding:clamp(48px,7vw,90px) clamp(20px,5vw,72px) clamp(32px,4vw,52px)\">\n      <div style=\"font-family:'Spline Sans Mono',monospace; font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:var(--accent,#7c3aed); margin-bottom:18px\">Workshops &amp; facilitation<\u002Fdiv>\n      <h1 style=\"font-family:var(--head,'Fraunces',Georgia,serif); font-weight:300; font-size:clamp(36px,5.4vw,66px); line-height:1.03; letter-spacing:-.02em; margin:0 0 22px; max-width:14em\">Sessions designed around your people and your environment.<\u002Fh1>\n      <p style=\"max-width:40em; font-size:clamp(16px,1.5vw,19px); line-height:1.62; color:#b4abc4; margin:0\">Every workshop is tailored; here’s the range of what I bring into the room, from my signature nervous system work to leadership and team development.<\u002Fp>\n    <\u002Fheader>\n\n    <!-- SIGNATURE DETAIL -->\n    <section style=\"max-width:1240px; margin:0 auto; padding:clamp(20px,3vw,32px) clamp(20px,5vw,72px) clamp(40px,5vw,64px)\">\n      <div style=\"background:#130f1b; border:1px solid rgba(139,92,246,.35); border-radius:22px; padding:clamp(30px,4vw,56px); display:grid; grid-template-columns:repeat(auto-fit, minmax(280px, 1fr)); gap:clamp(30px,4vw,56px); align-items:center\">\n        <div>\n          <div style=\"display:inline-flex; align-items:center; gap:8px; font-family:'Spline Sans Mono',monospace; font-size:11.5px; letter-spacing:.12em; text-transform:uppercase; color:var(--accent,#7c3aed); margin-bottom:16px; background:#14121a; padding:6px 12px; border-radius:100px\">★ Signature<\u002Fdiv>\n          <h2 style=\"font-family:var(--head,'Fraunces',Georgia,serif); font-weight:300; font-size:clamp(30px,4vw,46px); line-height:1.04; letter-spacing:-.02em; margin:0 0 18px\"><span style=\"font-style:italic\">Rooted &amp; Regulated<\u002Fspan><\u002Fh2>\n          <p style=\"font-size:16.5px; line-height:1.65; color:#ded6e8; margin:0 0 16px; max-width:32em\">A nervous system regulation workshop for high-performing women. We name the real sources of overwhelm and build body-based tools to stay grounded, clear, and resourced, even under pressure.<\u002Fp>\n          <p style=\"font-size:15px; line-height:1.6; color:#b4abc4; margin:0 0 26px; max-width:32em\">Ideal for women-led companies, groups, and organizations.<\u002Fp>\n          <a href=\"#contact\" style=\"text-decoration:none; font-size:15px; font-weight:600; color:#fff; background:var(--accent,#7c3aed); padding:14px 24px; border-radius:100px; display:inline-block\" style-hover=\"filter:brightness(1.08)\">Book Rooted &amp; Regulated<\u002Fa>\n        <\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:12px\">\n          <sc-for list=\"{{ rootedPoints }}\" as=\"p\" hint-placeholder-count=\"3\">\n            <div style=\"background:#14121a; border:1px solid rgba(255,255,255,.1); border-radius:14px; padding:20px 22px\">\n              <div style=\"font-family:var(--head,'Fraunces',Georgia,serif); font-size:18px; font-weight:500; margin-bottom:5px\">{{ p.title }}<\u002Fdiv>\n              <p style=\"font-size:14px; line-height:1.55; color:#b4abc4; margin:0\">{{ p.desc }}<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- TOPICS GRID -->\n    <section style=\"max-width:1240px; margin:0 auto; padding:clamp(20px,3vw,32px) clamp(20px,5vw,72px) clamp(44px,6vw,72px)\">\n      <div style=\"font-family:'Spline Sans Mono',monospace; font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:var(--accent,#7c3aed); margin-bottom:14px\">More workshop topics<\u002Fdiv>\n      <h2 style=\"font-family:var(--head,'Fraunces',Georgia,serif); font-weight:300; font-size:clamp(28px,4vw,44px); line-height:1.06; letter-spacing:-.02em; margin:0 0 clamp(28px,4vw,44px); max-width:16em\">For organizations, teams, and leaders.<\u002Fh2>\n      <div style=\"display:grid; grid-template-columns:repeat(auto-fit, minmax(230px, 1fr)); gap:clamp(16px,2vw,24px)\">\n        <sc-for list=\"{{ topics }}\" as=\"t\" hint-placeholder-count=\"5\">\n          <div style=\"display:flex; flex-direction:column; background:#14121a; border:1px solid rgba(255,255,255,.1); border-radius:16px; padding:28px 26px 24px; min-height:210px\">\n            <div style=\"font-family:'Spline Sans Mono',monospace; font-size:12px; color:var(--accent,#7c3aed); letter-spacing:.06em\">{{ t.no }}<\u002Fdiv>\n            <h3 style=\"font-family:var(--head,'Fraunces',Georgia,serif); font-weight:500; font-size:23px; line-height:1.12; letter-spacing:-.01em; margin:14px 0 10px\">{{ t.title }}<\u002Fh3>\n            <p style=\"font-size:14.5px; line-height:1.55; color:#b4abc4; margin:0\">{{ t.desc }}<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- AUDIENCES + FORMATS -->\n    <section style=\"background:#150f14; border-top:1px solid rgba(255,255,255,.08); border-bottom:1px solid rgba(255,255,255,.08)\">\n      <div style=\"max-width:1240px; margin:0 auto; padding:clamp(48px,6vw,84px) clamp(20px,5vw,72px); display:grid; grid-template-columns:repeat(auto-fit, minmax(280px, 1fr)); gap:clamp(36px,5vw,72px)\">\n        <div>\n          <div style=\"font-family:'Spline Sans Mono',monospace; font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:var(--accent,#7c3aed); margin-bottom:16px\">Who it’s for<\u002Fdiv>\n          <h3 style=\"font-family:var(--head,'Fraunces',Georgia,serif); font-weight:300; font-size:clamp(24px,3vw,34px); line-height:1.1; margin:0 0 20px\">I partner with a range of organizations.<\u002Fh3>\n          <div style=\"display:flex; flex-wrap:wrap; gap:10px\">\n            <sc-for list=\"{{ audiences }}\" as=\"a\" hint-placeholder-count=\"5\">\n              <span style=\"font-size:14px; padding:10px 16px; background:#14121a; border:1px solid rgba(255,255,255,.12); border-radius:100px\">{{ a }}<\u002Fspan>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-family:'Spline Sans Mono',monospace; font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:var(--accent,#7c3aed); margin-bottom:16px\">How we can work<\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; gap:12px\">\n            <sc-for list=\"{{ formats }}\" as=\"f\" hint-placeholder-count=\"3\">\n              <div style=\"display:flex; gap:14px; align-items:flex-start; background:#14121a; border:1px solid rgba(255,255,255,.1); border-radius:14px; padding:18px 20px\">\n                <span style=\"font-family:'Spline Sans Mono',monospace; font-size:12px; color:var(--accent,#7c3aed); margin-top:3px\">{{ f.no }}<\u002Fspan>\n                <div>\n                  <div style=\"font-family:var(--head,'Fraunces',Georgia,serif); font-size:18px; font-weight:500; margin-bottom:3px\">{{ f.title }}<\u002Fdiv>\n                  <p style=\"font-size:14px; line-height:1.55; color:#b4abc4; margin:0\">{{ f.desc }}<\u002Fp>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ================= CONTACT (shared) ================= -->\n  <section id=\"contact\" style=\"max-width:1240px; margin:0 auto; padding:clamp(52px,8vw,104px) clamp(20px,5vw,72px)\">\n    <div style=\"background:var(--accent,#7c3aed); border-radius:22px; padding:clamp(34px,6vw,76px); color:#fff; display:grid; grid-template-columns:repeat(auto-fit, minmax(300px, 1fr)); gap:clamp(36px,5vw,72px); align-items:center; box-shadow:0 30px 70px -40px rgba(124,58,237,.85)\">\n      <div>\n        <div style=\"font-family:'Spline Sans Mono',monospace; font-size:12px; letter-spacing:.14em; text-transform:uppercase; opacity:.85; margin-bottom:18px\">Let’s talk<\u002Fdiv>\n        <h2 style=\"font-family:var(--head,'Fraunces',Georgia,serif); font-weight:300; font-size:clamp(30px,4.4vw,52px); line-height:1.05; letter-spacing:-.02em; margin:0 0 20px\">Book a workshop.<\u002Fh2>\n        <p style=\"font-size:16.5px; line-height:1.6; opacity:.92; margin:0 0 16px; max-width:26em\">Tell me a little about your group and what you’re hoping to move through. I’ll reply within two business days.<\u002Fp>\n        <p style=\"font-size:14.5px; line-height:1.5; opacity:.8; margin:0 0 28px; max-width:26em\">Also available for events, panels, conferences, and summits.<\u002Fp>\n        <div style=\"display:flex; flex-direction:column; gap:10px; font-size:15px\">\n          <div style=\"display:flex; align-items:center; gap:10px\"><span style=\"opacity:.7; font-family:'Spline Sans Mono',monospace; font-size:12px\">EMAIL<\u002Fspan> info@serenitysoundhealingco.com<\u002Fdiv>\n          <div style=\"display:flex; align-items:center; gap:10px\"><span style=\"opacity:.7; font-family:'Spline Sans Mono',monospace; font-size:12px\">CALL&nbsp;<\u002Fspan> Book a 20-min intro chat<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ sent }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"background:rgba(255,255,255,.14); border:1px solid rgba(255,255,255,.35); border-radius:16px; padding:44px 36px; text-align:center\">\n          <div style=\"font-family:var(--head,'Fraunces',Georgia,serif); font-size:30px; margin-bottom:12px\">Thank you.<\u002Fdiv>\n          <p style=\"font-size:15.5px; line-height:1.6; opacity:.92; margin:0\">Your note is on its way. I’ll be in touch within two business days.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ notSent }}\" hint-placeholder-val=\"{{ true }}\">\n        <form onsubmit=\"{{ submit }}\" style=\"background:#14121a; border-radius:16px; padding:clamp(24px,3vw,34px); display:flex; flex-direction:column; gap:16px\">\n          <div>\n            <label style=\"display:block; font-size:12.5px; font-weight:600; color:#9d93ad; margin-bottom:7px; letter-spacing:.02em\">NAME<\u002Flabel>\n            <input value=\"{{ fName }}\" oninput=\"{{ onName }}\" placeholder=\"Your name\" style=\"width:100%; padding:13px 15px; border:1px solid rgba(255,255,255,.14); border-radius:10px; font-size:15px; color:#f0edf5; background:#1f1a29; outline:none\" style-focus=\"border-color:var(--accent,#7c3aed)\">\n          <\u002Fdiv>\n          <div>\n            <label style=\"display:block; font-size:12.5px; font-weight:600; color:#9d93ad; margin-bottom:7px; letter-spacing:.02em\">EMAIL<\u002Flabel>\n            <input value=\"{{ fEmail }}\" oninput=\"{{ onEmail }}\" placeholder=\"you@company.com\" style=\"width:100%; padding:13px 15px; border:1px solid rgba(255,255,255,.14); border-radius:10px; font-size:15px; color:#f0edf5; background:#1f1a29; outline:none\" style-focus=\"border-color:var(--accent,#7c3aed)\">\n          <\u002Fdiv>\n          <div>\n            <label style=\"display:block; font-size:12.5px; font-weight:600; color:#9d93ad; margin-bottom:7px; letter-spacing:.02em\">WHAT ARE YOU HOPING TO WORK THROUGH?<\u002Flabel>\n            <textarea value=\"{{ fMsg }}\" oninput=\"{{ onMsg }}\" rows=\"3\" placeholder=\"A few sentences is plenty…\" style=\"width:100%; padding:13px 15px; border:1px solid rgba(255,255,255,.14); border-radius:10px; font-size:15px; color:#f0edf5; background:#1f1a29; outline:none; resize:vertical; font-family:inherit\" style-focus=\"border-color:var(--accent,#7c3aed)\"><\u002Ftextarea>\n          <\u002Fdiv>\n          <button type=\"submit\" style=\"margin-top:4px; padding:15px; border:none; border-radius:100px; background:var(--accent,#7c3aed); color:#fff; font-size:15.5px; font-weight:600; cursor:pointer\" style-hover=\"filter:brightness(1.15)\">Send inquiry<\u002Fbutton>\n        <\u002Fform>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ================= FOOTER ================= -->\n  <footer style=\"border-top:1px solid rgba(255,255,255,.12); max-width:1240px; margin:0 auto; padding:clamp(40px,5vw,64px) clamp(20px,5vw,72px)\">\n    <div style=\"display:flex; flex-wrap:wrap; justify-content:space-between; gap:28px; align-items:flex-start\">\n      <div style=\"max-width:24em\">\n        <div style=\"display:flex; align-items:center; gap:11px; margin-bottom:14px\">\n          <span style=\"width:24px; height:24px; border-radius:50%; background:var(--accent,#7c3aed); display:inline-flex; align-items:center; justify-content:center\">\n            <span style=\"width:9px; height:9px; border-radius:50%; background:var(--rose,#f0a3cc)\"><\u002Fspan>\n          <\u002Fspan>\n          <span style=\"font-family:var(--head,'Fraunces',Georgia,serif); font-size:21px; font-weight:500\">Sasha Lawrence<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"font-size:14.5px; line-height:1.6; color:#9d93ad; margin:0\">Facilitation &amp; workshop design: helping people feel steady and lead well.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:flex; gap:clamp(32px,5vw,72px)\">\n        <div style=\"display:flex; flex-direction:column; gap:10px; font-size:14px\">\n          <span style=\"font-family:'Spline Sans Mono',monospace; font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#948aa3; margin-bottom:2px\">Explore<\u002Fspan>\n          <button onclick=\"{{ goHome }}\" style=\"background:none; border:none; cursor:pointer; padding:0; text-align:left; font-size:14px; color:#b4abc4\">Home<\u002Fbutton>\n          <button onclick=\"{{ goWork }}\" style=\"background:none; border:none; cursor:pointer; padding:0; text-align:left; font-size:14px; color:#b4abc4\">Workshops<\u002Fbutton>\n          <button onclick=\"{{ goAbout }}\" style=\"background:none; border:none; cursor:pointer; padding:0; text-align:left; font-size:14px; color:#b4abc4\">About<\u002Fbutton>\n          <a href=\"https://www.serenity-sound-healing.com\" target=\"_blank\" rel=\"noopener noreferrer\" style=\"text-decoration:none; font-size:14px; color:#b4abc4\">Sound Healing<\u002Fa>\n        <\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:10px; font-size:14px\">\n          <span style=\"font-family:'Spline Sans Mono',monospace; font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#948aa3; margin-bottom:2px\">Connect<\u002Fspan>\n          <a href=\"#contact\" style=\"text-decoration:none; color:#b4abc4\">info@serenitysoundhealingco.com<\u002Fa>\n          <a href=\"https://www.linkedin.com/in/sasha-lawrence-\" target=\"_blank\" rel=\"noopener noreferrer\" style=\"text-decoration:none; color:#b4abc4\">LinkedIn<\u002Fa>\n          <a href=\"#\" style=\"text-decoration:none; color:#b4abc4\">Instagram<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex; flex-wrap:wrap; justify-content:space-between; gap:12px; margin-top:44px; padding-top:22px; border-top:1px solid rgba(255,255,255,.1); font-size:12.5px; color:#948aa3; font-family:'Spline Sans Mono',monospace\">\n      <span>© 2026 Sasha Lawrence<\u002Fspan>\n      <span>Rooted &amp; Regulated™<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;accentColor&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#7c3aed&quot;, &quot;options&quot;: [&quot;#7c3aed&quot;, &quot;#7a5473&quot;, &quot;#8a5a62&quot;, &quot;#6a4f78&quot;], &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Theme&quot; },\n  &quot;roseColor&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#f0a3cc&quot;, &quot;options&quot;: [&quot;#f0a3cc&quot;, &quot;#a86f7c&quot;, &quot;#c08a86&quot;, &quot;#9a7590&quot;], &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Theme&quot; },\n  &quot;headingSerif&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Theme&quot; },\n  &quot;grain&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Theme&quot; }\n}\">\nclass Component extends DCLogic {\n  state = { view: 'home', open: 0, sent: false, fName: '', fEmail: '', fMsg: '', testimonialSent: false, tName: '', tOrg: '', tQuote: '' };\n\n  renderVals() {\n    const accent = this.props.accentColor ?? '#7c3aed';\n    const rose = this.props.roseColor ?? '#f0a3cc';\n    const headFont = (this.props.headingSerif ?? true)\n      ? \"'Fraunces', Georgia, serif\"\n      : \"'Hanken Grotesk', system-ui, sans-serif\";\n    const grain = this.props.grain ?? true;\n    const view = this.state.view;\n\n    const rootedPoints = [\n      { title: 'Understand the pattern', desc: 'Why high-achievers get stuck in overwhelm, and what the nervous system is actually doing underneath it.' },\n      { title: 'Practical, body-based tools', desc: 'Simple regulation practices your team can use in real meetings, hard conversations, and high-stakes weeks.' },\n      { title: 'Lead from steady', desc: 'How staying resourced changes the way you show up, decide, and hold space for others.' },\n    ];\n\n    const namedDynamics = [\n      { title: 'Absence of trust', desc: 'Team members hide mistakes and assume the worst about each other\\u2019s intentions, instead of asking.' },\n      { title: 'Fear of conflict', desc: 'A push for \"artificial harmony\" that trades real debate for back-channel politics and silence.' },\n      { title: 'Hidden competition', desc: 'Performing collaboration on the surface while competing underneath it.' },\n      { title: 'Groupthink & conformity', desc: 'The pressure to perform an \"ideal\" identity instead of showing up as yourself.' },\n    ];\n\n    const testimonialSlots = [{}, {}, {}];\n\n    const audiences = ['Companies', 'Small businesses', 'Consultancies', 'Organizations', 'Non-profits'];\n\n    const orgs = [\n      'Alpha Kappa Alpha Sorority, Inc.',\n      'Queens Build',\n      'A Place to Call Home',\n      'A Step Closer to Freedom',\n      'California Black Women\\u2019s Mental Health Project',\n    ];\n\n    const topics = [\n      { no: '01', title: 'Team Building', desc: 'Sessions that build trust, connection, and a shared sense of how this team works best together.' },\n      { no: '02', title: 'Leadership Workshops', desc: 'Practical development for new and seasoned leaders: presence, communication, and leading under pressure.' },\n      { no: '03', title: 'Building Confidence', desc: 'Helping people recognize their worth and speak, decide, and show up with more self-assurance.' },\n      { no: '04', title: 'Understanding Your Superpowers', desc: 'Strengths-based work that helps individuals name what they bring and use it with intention.' },\n      { no: '05', title: 'Emotional Intelligence at Work', desc: 'Building the self-awareness and empathy that make teams communicate and collaborate better.' },\n      { no: '06', title: 'Custom Workshops', desc: 'Have a specific goal or theme? I design a bespoke session around your people and your moment.' },\n    ];\n\n    const formats = [\n      { no: 'A', title: 'In-person workshops', desc: 'Half-day and full-day sessions, on-site with your team or group.' },\n      { no: 'B', title: 'Virtual sessions', desc: 'Engaging remote and hybrid workshops for distributed teams.' },\n      { no: 'C', title: 'Talks & keynotes', desc: 'Shorter talks for conferences, retreats, and organizational gatherings.' },\n    ];\n\n    const faqData = [\n      { q: 'Who is Rooted & Regulated for?', a: 'It\\u2019s designed for high-performing women and women-led companies, groups, and organizations; anyone carrying a lot who wants practical tools to stay grounded instead of running on burnout.' },\n      { q: 'Do you facilitate in person or virtually?', a: 'Both. In-person sessions are wonderful for connection and depth, but I design and lead engaging virtual and hybrid workshops regularly for distributed teams.' },\n      { q: 'What kinds of organizations do you work with?', a: 'A wide range: companies, small businesses, consultancies, nonprofits, sororities, and mission-driven organizations. Every session is tailored to the group in the room.' },\n      { q: 'Can you tailor a workshop to our theme?', a: 'Yes. Beyond my signature and core topics, I regularly design custom workshops around a specific goal, event, or challenge your team is navigating.' },\n      { q: 'How do we get started?', a: 'Send a note through the contact form with a little about your group and what you\\u2019re hoping to move through. I\\u2019ll reply within two business days to set up a short intro call.' },\n    ];\n    const faqs = faqData.map((f, i) => ({\n      q: f.q,\n      a: f.a,\n      sign: this.state.open === i ? '\\u2212' : '+',\n      isOpen: this.state.open === i,\n      toggle: () => this.setState(s => ({ open: s.open === i ? -1 : i })),\n    }));\n\n    const scrollTop = () => { try { window.scrollTo({ top: 0, behavior: 'smooth' }); } catch (e) {} };\n\n    return {\n      accent, rose, headFont,\n      grainDisplay: grain ? 'block' : 'none',\n      isHome: view === 'home',\n      isWork: view === 'workshops',\n      homeColor: view === 'home' ? accent : '#b4abc4',\n      homeWeight: view === 'home' ? 700 : 500,\n      workColor: view === 'workshops' ? accent : '#b4abc4',\n      workWeight: view === 'workshops' ? 700 : 500,\n      goHome: () => { this.setState({ view: 'home' }); scrollTop(); },\n      goWork: () => { this.setState({ view: 'workshops' }); scrollTop(); },\n      goAbout: () => {\n        this.setState({ view: 'home' });\n        setTimeout(() => { const el = document.getElementById('about'); if (el) window.scrollTo({ top: el.getBoundingClientRect().top + window.scrollY - 60, behavior: 'smooth' }); }, 60);\n      },\n      rootedPoints, namedDynamics, testimonialSlots, audiences, orgs, topics, formats, faqs,\n      sent: this.state.sent,\n      notSent: !this.state.sent,\n      fName: this.state.fName,\n      fEmail: this.state.fEmail,\n      fMsg: this.state.fMsg,\n      onName: (e) => this.setState({ fName: e.target.value }),\n      onEmail: (e) => this.setState({ fEmail: e.target.value }),\n      onMsg: (e) => this.setState({ fMsg: e.target.value }),\n      submit: (e) => { e.preventDefault(); this.setState({ sent: true }); },\n      testimonialSent: this.state.testimonialSent,\n      testimonialNotSent: !this.state.testimonialSent,\n      tName: this.state.tName,\n      tOrg: this.state.tOrg,\n      tQuote: this.state.tQuote,\n      onTName: (e) => this.setState({ tName: e.target.value }),\n      onTOrg: (e) => this.setState({ tOrg: e.target.value }),\n      onTQuote: (e) => this.setState({ tQuote: e.target.value }),\n      submitTestimonial: (e) => {\n        e.preventDefault();\n        const subject = encodeURIComponent('Website testimonial from ' + (this.state.tName || 'a visitor'));\n        const body = encodeURIComponent(\n          'Name: ' + this.state.tName + '\\n' +\n          'Organization: ' + this.state.tOrg + '\\n\\n' +\n          this.state.tQuote\n        );\n        try { window.location.href = 'mailto:info@serenitysoundhealingco.com?subject=' + subject + '&body=' + body; } catch (err) {}\n        this.setState({ testimonialSent: true });\n      },\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
